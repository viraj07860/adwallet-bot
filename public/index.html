<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdWallet</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    .container {
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      margin-bottom: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .balance {
      font-size: 26px;
      text-align: center;
      margin: 10px 0;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:active {
      transform: scale(0.97);
    }

    .task {
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      margin-top: 20px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 id="welcome">💰 AdWallet</h1>

  <div class="card">
    <div class="balance">
      Balance: <span id="balance">0</span> coins
    </div>
  </div>

  <div class="card">
    <h3>📋 Tasks</h3>

    <div class="task">
      🎥 Watch Ad (+20)
      <button onclick="watchAd(this)">Start</button>
    </div>

    <div class="task">
      📢 Join Channel (+10)
      <button onclick="joinChannel()">Join</button>
    </div>

  </div>

  <div class="footer">
    Powered by AdWallet 🚀
  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const user = tg.initDataUnsafe?.user;
  const userId = user?.id || Math.floor(Math.random() * 100000);

  // Show name
  const name = user?.first_name || "User";
  document.getElementById("welcome").innerText = `💰 Welcome ${name}`;

  async function loadUser() {
    const res = await fetch(`/user/${userId}`);
    const data = await res.json();
    document.getElementById("balance").innerText = data.balance;
  }

  async function watchAd(btn) {
    btn.innerText = "⏳ Watching...";
    btn.disabled = true;

    setTimeout(async () => {
      const res = await fetch(`/api/adsgram-reward?userId=${userId}`);
      const data = await res.json();

      if (data.error) {
        alert(data.error);
      } else {
        alert("✅ Earned " + data.reward);
        loadUser();
      }

      btn.innerText = "Start";
      btn.disabled = false;
    }, 3000);
  }

  function joinChannel() {
    window.open("https://t.me/AdWalletCommunity", "_blank");
  }

  loadUser();
</script>

</body>
</html>
