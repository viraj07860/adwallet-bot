<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdWallet</title><!-- Telegram --><script src="https://telegram.org/js/telegram-web-app.js"></script><style>
body{font-family:sans-serif;background:#f0fdf4;margin:0;text-align:center}
.card{background:#fff;margin:20px;padding:20px;border-radius:15px}
.btn{background:#22c55e;color:#fff;padding:12px;border:none;border-radius:10px;width:100%}
#popup{position:fixed;top:10px;width:100%}
.popup{background:#fff;margin:5px;padding:10px;border-radius:10px}
#lock{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;justify-content:center;align-items:center}
</style></head><body><!-- 🔒 SUBSCRIBE LOCK --><div id="lock">
  <div class="card">
    <h3>📢 Join Channel</h3>
    <a href="https://t.me/adwalletcommunity" target="_blank" class="btn">Subscribe</a><br><br>
    <button class="btn" onclick="unlock()">I Subscribed</button>
  </div>
</div><!-- DASHBOARD --><div class="card">
<h2 id="user">User</h2>
<h1>$<span id="bal">0.00</span></h1><button class="btn" onclick="watchAd()">🎬 Watch Ad</button><br><br>
<button class="btn" onclick="bonus()">🎁 Daily Bonus</button>

</div><!-- REFERRAL --><div class="card">
<h3>Invite & Earn ($0.075)</h3>
<input id="ref" value="https://t.me/adwallet_bot?start=REF123" style="width:100%">
<button class="btn" onclick="copy()">Copy</button>
</div><!-- WITHDRAW --><div class="card">
<h3>Withdraw (Min $10)</h3>
<input id="amt" placeholder="$10" style="width:100%;padding:10px"><br><br>
<button class="btn" onclick="withdraw()">Withdraw</button>
</div><div id="popup"></div><!-- Monetag SDK --><script src='//libtl.com/sdk.js' data-zone='10760190' data-sdk='show_10760190'></script><script>
let bal=0;
let unlocked=false;
let lastAd=0;
let daily=0;

// unlock
function unlock(){
  unlocked=true;
  document.getElementById("lock").style.display="none";
}

// check
function check(){
  if(!unlocked){alert("Subscribe first");return false;}
  return true;
}

// reward ad (Monetag)
function watchAd(){
  if(!check()) return;

  let now=Date.now();
  if(now-lastAd<30000){alert("Wait 30 sec");return;}
  if(daily>=10){alert("Limit reached");return;}

  lastAd=now;
  daily++;

  show_10760190('pop').then(res=>{

    if(res?.reward_event_type==="valued"){
      let reward=(Math.random()*0.05+0.05);
      bal+=reward;
      update();
      alert("+$"+reward.toFixed(2));
    } else {
      alert("No reward");
    }

  }).catch(()=>alert("Ad failed"));
}

// bonus
function bonus(){
  if(!check()) return;
  bal+=0.25;
  update();
}

// withdraw
function withdraw(){
  let a=parseFloat(document.getElementById("amt").value);
  if(a<10) return alert("Min $10");
  if(a>bal) return alert("No balance");
  bal-=a;
  update();
  alert("Requested");
}

// update UI
function update(){
  document.getElementById("bal").innerText=bal.toFixed(2);
}

// copy
function copy(){
  navigator.clipboard.writeText(document.getElementById("ref").value);
  alert("Copied");
}

// popup system
const names=["Rahul","Ali","John","Priya","Sneha","David"];
const methods=["PayPal","Bitcoin","Paytm","PhonePe"];

setInterval(()=>{
  let n=names[Math.random()*names.length|0];
  let m=methods[Math.random()*methods.length|0];
  let a=(Math.random()*100+10).toFixed(2);

  let el=document.createElement("div");
  el.className="popup";
  el.innerText=`${n} withdrew $${a} via ${m}`;
  document.getElementById("popup").appendChild(el);

  setTimeout(()=>el.remove(),1000);
},10000);

// telegram user
window.onload=()=>{
  if(window.Telegram){
    let u=Telegram.WebApp.initDataUnsafe.user;
    if(u) document.getElementById("user").innerText=u.first_name;
  }

  // AUTO ADS (your income)
  show_10760190({
    type:'inApp',
    inAppSettings:{
      frequency:2,
      capping:0.1,
      interval:30,
      timeout:5,
      everyPage:false
    }
  });
}
</script></body>
</html>
