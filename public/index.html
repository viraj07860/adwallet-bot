<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AdWallet Premium</title>

<script src='//libtl.com/sdk.js' data-zone='10760190' data-sdk='show_10760190'></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  :root {
    --neon-cyan: #00f2ff;
    --neon-purple: #bc13fe;
    --bg-dark: #050505;
    --glass: rgba(255, 255, 255, 0.03);
    --sidebar-w: 280px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white; overflow: hidden; height: 100vh; }

  /* GLASSMORPHISM UI */
  .glass-card {
    background: var(--glass);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .neon-text { text-shadow: 0 0 10px var(--neon-cyan); color: var(--neon-cyan); }
  .btn-cyber { background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); color: black; font-weight: 800; }

  /* SIDEBAR LOGIC */
  #sidebar {
    position: fixed; top: 0; left: 0; height: 100%; width: var(--sidebar-w);
    background: #0a0a0a; border-right: 1px solid rgba(0, 242, 255, 0.2);
    transform: translateX(-100%); transition: 0.3s; z-index: 1000;
  }
  #sidebar.open { transform: translateX(0); }
  #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); opacity: 0; pointer-events: none; z-index: 900; transition: 0.3s; }
  #overlay.show { opacity: 1; pointer-events: all; }

  /* ANIMATIONS */
  .live-dot { width: 8px; height: 8px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 10px #00f2ff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  
  .popup {
    background: rgba(0,0,0,0.9); border-left: 3px solid var(--neon-cyan);
    position: fixed; top: 70px; left: 15px; right: 15px; padding: 12px;
    border-radius: 12px; transform: translateY(-20px); opacity: 0; transition: 0.4s; z-index: 1100;
  }
  .popup.show { transform: translateY(0); opacity: 1; }
</style>
</head>
<body class="flex flex-col p-4">

<div id="overlay" onclick="toggleSidebar()"></div>

<nav id="sidebar" class="p-6 flex flex-col">
  <div class="mb-10">
    <div class="w-12 h-12 rounded-full bg-cyan-500/20 mb-4 flex items-center justify-center text-xl">👤</div>
    <div class="font-bold text-lg" id="sb-name">Operator</div>
    <div class="text-xs text-gray-500">Balance: <span class="neon-text" id="sb-bal">₹0.00</span></div>
  </div>
  <div class="space-y-4 flex-1">
    <div class="p-3 glass-card rounded-xl text-sm font-bold neon-text" onclick="navigate('dashboard')">Dashboard</div>
    <div class="p-3 text-gray-400 text-sm font-bold" onclick="navigate('ads')">Watch Ads</div>
    <div class="p-3 text-gray-400 text-sm font-bold" onclick="navigate('cashout')">Cash Out</div>
  </div>
  <div class="text-[10px] text-gray-600 text-center uppercase tracking-widest">AdWallet Pro v2.5</div>
</nav>

<div class="flex justify-between items-center mb-6 z-10">
  <div onclick="toggleSidebar()" class="w-10 h-10 glass-card rounded-xl flex flex-col items-center justify-center gap-1">
    <span class="w-5 h-0.5 bg-white"></span>
    <span class="w-5 h-0.5 bg-white"></span>
  </div>
  <div class="text-xl font-black neon-text italic">ADWALLET</div>
  <div class="glass-card px-3 py-1 rounded-full text-[10px] font-bold">₹<span id="tb-bal">0.00</span></div>
</div>

<div id="popup-container"></div>

<main id="main" class="flex-1 overflow-y-auto pb-20">
  <div class="page active" id="page-dashboard">
    <div class="glass-card rounded-[2.5rem] p-8 mb-6 text-center relative overflow-hidden">
      <div class="absolute -top-10 -left-10 w-32 h-32 bg-cyan-500/10 blur-[50px]"></div>
      <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em] mb-2 font-bold">Total Credits</p>
      <div class="text-6xl font-black neon-text tracking-tighter">₹<span id="bal-main">0.00</span></div>
      
      <div class="mt-6 flex gap-3">
        <button onclick="navigate('cashout')" class="flex-1 py-3 glass-card rounded-2xl text-xs font-bold uppercase">Withdraw</button>
        <button onclick="claimBonus()" class="flex-1 py-3 glass-card rounded-2xl text-xs font-bold uppercase border-cyan-500/30">Bonus</button>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="glass-card rounded-2xl p-4 border-b-2 border-cyan-500">
        <p class="text-[9px] text-gray-500 font-bold uppercase">Total Payouts</p>
        <p class="text-sm font-mono neon-text" id="stat-payout">₹48,312</p>
      </div>
      <div class="glass-card rounded-2xl p-4 border-b-2 border-purple-500">
        <p class="text-[9px] text-gray-500 font-bold uppercase">Active Users</p>
        <p class="text-sm font-mono" id="stat-users">12,847</p>
      </div>
    </div>

    <button onclick="triggerAd()" class="btn-cyber w-full py-5 rounded-2xl font-black text-lg uppercase tracking-widest shadow-lg shadow-cyan-500/20">
      ⚡ Earn Credits
    </button>
  </div>
</main>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
const userId = tg.initDataUnsafe?.user?.id || 12345;

// SIDEBAR TOGGLE
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
}

// AD TRIGGER
function triggerAd() {
    show_10760190().then(() => {
        processReward();
        tg.HapticFeedback.notificationOccurred('success');
    }).catch(e => {
        alert("Ad not ready. Please try again.");
    });
}

// REWARD LOGIC
async function processReward() {
    const res = await fetch(`/api/adsgram-reward?userId=${userId}`);
    const data = await res.json();
    if(data.success) {
        loadUser();
        showPopup("Neural Link Confirmed", "₹20.00 added to wallet");
    }
}

async function loadUser() {
    try {
        const res = await fetch(`/user/${userId}`);
        const user = await res.json();
        const bal = user.balance.toFixed(2);
        document.getElementById('bal-main').innerText = bal;
        document.getElementById('tb-bal').innerText = bal;
        document.getElementById('sb-bal').innerText = "₹" + bal;
    } catch(e) {}
}

// LIVE STATS ANIMATION
function updateStats() {
    let payouts = parseInt(document.getElementById('stat-payout').innerText.replace('₹',''));
    document.getElementById('stat-payout').innerText = '₹' + (payouts + Math.floor(Math.random()*10)).toLocaleString();
}
setInterval(updateStats, 5000);

// POPUP SYSTEM
function showPopup(main, sub) {
    const container = document.getElementById('popup-container');
    const el = document.createElement('div');
    el.className = 'popup glass-card';
    el.innerHTML = `<div class="font-bold text-xs neon-text uppercase">${main}</div><div class="text-[10px] text-gray-400">${sub}</div>`;
    container.appendChild(el);
    setTimeout(() => el.classList.add('show'), 100);
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 500); }, 4000);
}

loadUser();
</script>
</body>
</html>
