<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdWallet Premium</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
  color: white;
  font-family: sans-serif;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
}

.nav-active { color:#38bdf8; }
</style>
</head>

<body class="pb-24">

<!-- HEADER -->
<div class="flex justify-between p-5">
  <div>
    <h2 id="name">Hi</h2>
    <p class="text-xs text-gray-400">Earn daily 💰</p>
  </div>
  <img src="/logo.png" class="w-10 h-10 rounded-full">
</div>

<!-- BALANCE -->
<div class="glass mx-5 p-6 rounded-3xl mb-5">
  <p class="text-xs text-gray-400">Balance</p>
  <h1 id="balance" class="text-3xl font-bold">₹0</h1>
</div>

<!-- STREAK -->
<div class="glass mx-5 p-4 rounded-2xl mb-5 flex justify-between">
  <span>🔥 Streak</span>
  <span id="streak">0</span>
</div>

<!-- TASKS -->
<div class="px-5 space-y-3" id="tasks"></div>

<!-- REWARD POPUP -->
<div id="rewardBox" style="
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#111;
padding:20px;
border-radius:15px;
transition:0.3s;
">
🎉 Reward
</div>

<!-- NAV -->
<div class="fixed bottom-0 w-full flex justify-around p-4 glass">
  <div onclick="nav('home')" class="nav-active">🏠</div>
  <div onclick="nav('spin')">🎡</div>
  <div onclick="nav('wallet')">💰</div>
</div>

<script>
const tg = window.Telegram?.WebApp || {
  HapticFeedback:{impactOccurred:()=>{}}
};

tg.expand();
tg.ready();

const user = tg.initDataUnsafe?.user;

// USER
if(user){
  document.getElementById("name").innerText = "Hi, " + user.first_name;
}

// SOUND
const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
function playClick(){ clickSound.play(); }

// BALANCE LOAD
async function loadBalance(){
  if(!user) return;
  try{
    const res = await fetch(`/user/${user.id}`);
    const data = await res.json();
    document.getElementById("balance").innerText = "₹"+data.balance;
  }catch{
    document.getElementById("balance").innerText = "₹0";
  }
}

// TASKS
function loadTasks(){
  const tasks = [
    {title:"Join Channel", reward:10, link:"https://t.me/AdWalletCommunity"},
    {title:"Visit Site", reward:20, link:"https://google.com"}
  ];

  const box = document.getElementById("tasks");

  tasks.forEach(t=>{
    const div = document.createElement("div");
    div.className="glass p-4 rounded-xl flex justify-between";

    div.innerHTML=`
      <div>
        <b>${t.title}</b><br>
        <small>+₹${t.reward}</small>
      </div>
      <button onclick="start('${t.link}',${t.reward})">Start</button>
    `;

    box.appendChild(div);
  });
}

// START TASK
function start(link, amount){
  playClick();
  tg.HapticFeedback.impactOccurred("medium");

  window.open(link);

  setTimeout(()=>{
    confetti({particleCount:100,spread:70});
    showReward(amount);
  },1000);
}

// REWARD
function showReward(val){
  const box=document.getElementById("rewardBox");
  box.innerText="🎉 +₹"+val;
  box.style.transform="translate(-50%,-50%) scale(1)";
  setTimeout(()=>box.style.transform="scale(0)",1500);
}

// STREAK
function streak(){
  let s=localStorage.getItem("s")||0;
  let last=localStorage.getItem("d");
  let today=new Date().toDateString();

  if(last!==today){
    s++;
    localStorage.setItem("s",s);
    localStorage.setItem("d",today);
  }

  document.getElementById("streak").innerText=s+" days";
}

// NAV
function nav(x){
  playClick();
}

// DAILY BONUS
function bonus(){
  let last=localStorage.getItem("bonus");
  let today=new Date().toDateString();

  if(last!==today){
    localStorage.setItem("bonus",today);
    showReward(20);
  }
}

// INIT
loadBalance();
loadTasks();
streak();
bonus();

</script>

</body>
</html>
