<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdWallet</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root {
  --bg-color: var(--tg-theme-bg-color, #0f172a);
  --text-color: var(--tg-theme-text-color, #ffffff);
  --hint-color: var(--tg-theme-hint-color, #9ca3af);
  --button-color: var(--tg-theme-button-color, #00f5ff);
  --secondary-bg-color: var(--tg-theme-secondary-bg-color, #1e293b);
}

body {
  background: var(--bg-color);
  color: var(--text-color);
  margin: 0;
  font-family: sans-serif;
}

/* HEADER */
header {
  padding: 20px;
  display: flex;
  justify-content: space-between;
}

.logo {
  width: 40px;
  border-radius: 50%;
}

/* STATS */
.stats {
  display: flex;
  gap: 10px;
  padding: 0 20px;
}

.card {
  flex: 1;
  background: var(--secondary-bg-color);
  padding: 15px;
  border-radius: 15px;
  text-align: center;
}

.card h2 {
  margin: 0;
  color: var(--button-color);
}

/* TASKS */
.tasks {
  padding: 20px;
}

.task {
  background: var(--secondary-bg-color);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  background: var(--button-color);
  border: none;
  padding: 10px;
  border-radius: 8px;
  color: black;
  font-weight: bold;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: var(--secondary-bg-color);
  padding: 10px;
}
</style>
</head>

<body>

<header>
  <div>
    <h2 id="name">Hello</h2>
    <small>Earn money daily 💰</small>
  </div>
  <img src="/logo.png" class="logo">
</header>

<div class="stats">
  <div class="card">
    <h2 id="balance">₹0</h2>
    <p>Balance</p>
  </div>
  <div class="card">
    <h2 id="tasksDone">0</h2>
    <p>Tasks</p>
  </div>
</div>

<div class="tasks" id="tasks"></div>

<div class="nav">
  <div>🏠</div>
  <div>📋</div>
  <div>👤</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

const user = tg.initDataUnsafe?.user;

// USER NAME
if(user){
  document.getElementById("name").innerText = "Hi, " + user.first_name;
}

// LOAD USER DATA
async function loadUser(){
  const res = await fetch(`/user/${user.id}`);
  const data = await res.json();

  document.getElementById("balance").innerText = "₹" + data.balance;
}

// TASKS
async function loadTasks(){
  const res = await fetch('/tasks');
  const tasks = await res.json();

  const container = document.getElementById("tasks");

  tasks.forEach(t=>{
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <div>
        <b>${t.title}</b><br>
        💰 ₹${t.reward}
      </div>
      <button onclick="startTask('${t.link}',${t.reward})">START</button>
    `;

    container.appendChild(div);
  });
}

// TASK ACTION
function startTask(link, reward){
  tg.HapticFeedback.impactOccurred("medium");

  const final = link.replace("{user_id}", user.id);
  window.open(final);

  setTimeout(()=>{
    tg.showPopup({
      title:"🎉 Reward",
      message:`You earned ₹${reward}`,
      buttons:[{type:"ok"}]
    });
  },1000);
}

loadUser();
loadTasks();
</script>

</body>
</html>
