ww<!DOCTYPE html>
<html>
<head>
  <title>AdWallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: #020617;
      color: white;
      text-align: center;
    }

    .card {
      margin: 15px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 20px rgba(0,255,255,0.1);
    }

    .btn {
      width: 85%;
      padding: 14px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .earn { background: #00f5ff; color:black; }
    .withdraw { background: red; }
    .ref { background: purple; }

    #progress {
      height:6px;
      background:#00f5ff;
      width:0%;
      transition:0.4s;
    }
  </style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader" style="
position:fixed;
width:100%;
height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
">
  <img src="/logo.png" width="100">
  <h2>AdWallet</h2>
  <p>Loading...</p>
</div>

<!-- 🔥 HEADER -->
<div class="card">
  <img src="/logo.png" width="70" style="border-radius:50%;">
  <h2>AdWallet</h2>
</div>

<!-- PROGRESS -->
<div style="width:90%;margin:auto;background:#111;border-radius:10px;">
  <div id="progress"></div>
</div>

<!-- BALANCE -->
<div class="card">
  <h2 id="balance">₹0</h2>
  <p>Wallet Balance</p>
</div>

<!-- STREAK -->
<div class="card">
  <h3 id="streak">🔥 0 days</h3>
</div>

<!-- BUTTONS -->
<button class="btn earn" onclick="earn()">⚡ Earn</button>
<button class="btn withdraw" onclick="withdraw()">💸 Withdraw</button>
<button class="btn ref" onclick="ref()">👥 Referral</button>

<!-- TASKS -->
<div class="card">
  <h3>Tasks</h3>
  <div id="tasks">Loading...</div>
</div>

<!-- REWARD -->
<div id="popup" style="
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:#111;
padding:20px;
border-radius:10px;
transition:0.3s;
">
  <h2>🎉 Reward</h2>
  <p id="reward">+₹10</p>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const userId = tg.initDataUnsafe?.user?.id;

// 🔥 Loader
window.onload = () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 1500);
};

// 🔥 Progress
function progress(p){
  document.getElementById("progress").style.width = p+"%";
}

// 🔥 Confetti
function boom(){
  confetti({particleCount:100,spread:70});
}

// 🔥 Reward
function reward(val){
  const p = document.getElementById("popup");
  document.getElementById("reward").innerText = "+₹"+val;
  p.style.transform="translate(-50%,-50%) scale(1)";
  setTimeout(()=>p.style.transform="scale(0)",1500);
}

// 🔥 Streak
function streak(){
  let s = localStorage.getItem("s") || 0;
  let last = localStorage.getItem("d");
  let today = new Date().toDateString();

  if(last !== today){
    s++;
    localStorage.setItem("s", s);
    localStorage.setItem("d", today);
  }

  document.getElementById("streak").innerText = "🔥 "+s+" days";
}

// 🔥 Tasks
function loadTasks(){
  const t = [
    {title:"Join Channel", reward:10, link:"https://t.me/AdWalletCommunity"},
    {title:"Visit Website", reward:20, link:"https://google.com"}
  ];

  const c = document.getElementById("tasks");

  t.forEach(task=>{
    const d = document.createElement("div");
    d.innerHTML = `
      <p>${task.title} (+₹${task.reward})</p>
      <button onclick="start('${task.link}',${task.reward})">START</button>
    `;
    c.appendChild(d);
  });
}

// 🔥 Start task
function start(link, amount){
  progress(50);
  window.open(link);

  setTimeout(()=>{
    progress(100);
    boom();
    reward(amount);
    setTimeout(()=>progress(0),1000);
  },1000);
}

// Buttons
function earn(){ alert("Complete tasks"); }
function withdraw(){ alert("Use /withdraw"); }
function ref(){
  const link = `https://t.me/AdzwalletBot?start=${userId}`;
  navigator.clipboard.writeText(link);
  alert("Copied 🚀");
}

// INIT
streak();
loadTasks();
</script>

</body>
</html>
