<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdWallet Premium</title>
    <script src="https://app.adsgram.ai/js/adsgram-ad-sdk.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .neon-glow {
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .btn-main {
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-main:active {
            transform: scale(0.92);
            filter: brightness(1.2);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="p-5 flex flex-col min-h-screen">

    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-xl btn-main flex items-center justify-center font-bold text-black shadow-lg shadow-cyan-500/20">A</div>
            <span class="text-xl font-bold tracking-tighter uppercase">Ad<span class="text-cyan-400">Wallet</span></span>
        </div>
        <div class="glass-card px-4 py-1.5 rounded-full border border-cyan-500/30">
            <span class="text-[10px] font-bold text-cyan-400 animate-pulse">● NETWORK LIVE</span>
        </div>
    </div>

    <div class="glass-card w-full rounded-[2.5rem] p-8 mb-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 blur-[60px] rounded-full"></div>
        <div class="relative z-10">
            <h2 class="text-gray-400 text-xs font-bold uppercase tracking-[0.2em] mb-3">Verified Balance</h2>
            <div class="flex items-baseline gap-2">
                <span class="text-4xl font-light text-gray-400">₹</span>
                <span id="balance" class="text-6xl font-bold tracking-tighter">0.00</span>
            </div>
            <div class="mt-6 flex gap-4">
                <div class="glass-card bg-white/5 rounded-2xl px-4 py-2">
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Total Ads</p>
                    <p id="tasks" class="text-sm font-bold">0</p>
                </div>
                <div class="glass-card bg-white/5 rounded-2xl px-4 py-2">
                    <p class="text-[9px] text-gray-500 uppercase font-bold">Daily Cap</p>
                    <p class="text-sm font-bold">10/10</p>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-auto space-y-4 pb-4">
        <div id="status-msg" class="text-center text-[10px] text-gray-500 uppercase font-bold tracking-widest h-4"></div>
        
        <button onclick="showAd()" class="btn-main w-full py-5 rounded-2xl text-black font-black uppercase tracking-tight text-lg shadow-xl shadow-purple-500/20">
            Initialize Reward Ad
        </button>

        <div class="grid grid-cols-2 gap-4">
            <button class="glass-card py-4 rounded-2xl text-xs font-bold uppercase text-gray-400 hover:text-white transition">
                Withdraw
            </button>
            <button onclick="window.Telegram.WebApp.close()" class="glass-card py-4 rounded-2xl text-xs font-bold uppercase text-gray-400 hover:text-white transition">
                Exit System
            </button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#050505';

        // USER DETAILS
        const userId = tg.initDataUnsafe?.user?.id || 12345; // Default for browser testing

        // ADSGRAM INITIALIZATION (Your Details)
        const AdController = window.Adsgram.init({ 
            blockId: "25642", 
            debug: true // Change to FALSE when you are ready for real money
        });

        // FETCH USER DATA ON LOAD
        async function loadUser() {
            try {
                const response = await fetch(`/user/${userId}`);
                const data = await response.json();
                document.getElementById('balance').innerText = data.balance.toFixed(2);
                document.getElementById('tasks').innerText = data.tasks || 0;
            } catch (err) {
                console.error("Failed to load user data");
            }
        }

        async function showAd() {
            const status = document.getElementById('status-msg');
            status.innerText = "Connecting to Ad Server...";
            
            try {
                await AdController.show();
                status.innerText = "Validating Reward...";
                
                // REWARD CALL TO BACKEND
                const response = await fetch(`/api/adsgram-reward?userId=${userId}`);
                const data = await response.json();

                if (data.success) {
                    status.innerText = "Reward Confirmed +₹20";
                    loadUser(); // Refresh balance
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    status.innerText = data.error;
                    tg.HapticFeedback.notificationOccurred('error');
                }
            } catch (err) {
                status.innerText = "Ad Skipped or Error";
                console.log(err);
            }
            
            setTimeout(() => { status.innerText = ""; }, 3000);
        }

        loadUser();
    </script>
</body>
</html>
