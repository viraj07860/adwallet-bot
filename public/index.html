<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Exec Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #00ff88; /* Success Green */
            --accent-blue: #007AFF;
            --text-main: #ffffff;
            --text-dim: #888888;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Ambient Glows */
        .glow-top {
            position: fixed;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        /* Header / Balance Section */
        header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .balance-label {
            color: var(--text-dim);
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 800;
            margin: 10px 0;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-change {
            display: inline-block;
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Action Buttons */
        .action-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .action-btn {
            background: var(--card-bg);
            border: var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: 0.2s;
        }

        .action-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        .action-icon { font-size: 20px; margin-bottom: 5px; display: block; }
        .action-label { font-size: 12px; font-weight: 500; }

        /* Market Section */
        .section-title {
            padding: 0 20px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .asset-list {
            padding: 0 20px 100px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .asset-card {
            background: var(--card-bg);
            border: var(--glass-border);
            padding: 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .asset-info { display: flex; align-items: center; gap: 12px; }
        .asset-logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .asset-details h4 { margin: 0; font-size: 16px; }
        .asset-details p { margin: 0; font-size: 12px; color: var(--text-dim); }

        .asset-market { text-align: right; }
        .price { font-weight: 600; display: block; }
        .change { font-size: 12px; }
        .change.up { color: var(--accent); }

        /* Bottom Nav - Crypto Floating Style */
        .nav-bar {
            position: fixed;
            bottom: 25px;
            left: 20px;
            right: 20px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border: var(--glass-border);
            height: 70px;
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-item { font-size: 22px; opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--accent-blue); filter: drop-shadow(0 0 8px var(--accent-blue)); }

    </style>
</head>
<body>
    <div class="glow-top"></div>

    <header>
        <span class="balance-label">Net Worth</span>
        <div class="balance-amount">$142,580.00</div>
        <div class="balance-change">+$1,240.50 (0.88%) ↑</div>
    </header>

    <div class="action-row">
        <div class="action-btn" onclick="haptic()">
            <span class="action-icon">➕</span>
            <span class="action-label">Buy</span>
        </div>
        <div class="action-btn" onclick="haptic()">
            <span class="action-icon">📤</span>
            <span class="action-label">Send</span>
        </div>
        <div class="action-btn" onclick="haptic()">
            <span class="action-icon">💎</span>
            <span class="action-label">Stake</span>
        </div>
    </div>

    <h3 class="section-title">Your Assets</h3>

    <div class="asset-list">
        <div class="asset-card">
            <div class="asset-info">
                <div class="asset-logo" style="color: #F7931A;">₿</div>
                <div class="asset-details">
                    <h4>Bitcoin</h4>
                    <p>0.42 BTC</p>
                </div>
            </div>
            <div class="asset-market">
                <span class="price">$64,210</span>
                <span class="change up">+2.4%</span>
            </div>
        </div>

        <div class="asset-card">
            <div class="asset-info">
                <div class="asset-logo" style="color: #627EEA;">Ξ</div>
                <div class="asset-details">
                    <h4>Ethereum</h4>
                    <p>12.5 ETH</p>
                </div>
            </div>
            <div class="asset-market">
                <span class="price">$3,450</span>
                <span class="change up">+1.8%</span>
            </div>
        </div>

        <div class="asset-card">
            <div class="asset-info">
                <div class="asset-logo" style="color: #00ff88;">₮</div>
                <div class="asset-details">
                    <h4>Tether</h4>
                    <p>5,000 USDT</p>
                </div>
            </div>
            <div class="asset-market">
                <span class="price">$1.00</span>
                <span class="change">0.0%</span>
            </div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active">👛</div>
        <div class="nav-item">📊</div>
        <div class="nav-item">🔄</div>
        <div class="nav-item">👤</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#050505';
        tg.backgroundColor = '#050505';

        function haptic() {
            tg.HapticFeedback.impactOccurred('medium');
        }
    </script>
</body>
</html>
